<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillVerse</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/verilog.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#080808;--surface:#0f0f0f;--card:#141414;--border:#1e2d4a;
      --text:#cdd9f0;--muted:#5a7090;--accent1:#00ccff;--accent2:#00ffcc;
      --font-body:"Inter",sans-serif;--font-mono:"JetBrains Mono",monospace;
    }
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:16px;line-height:1.7;min-height:100vh}
    body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 15% 10%,rgba(0,204,255,.07) 0%,transparent 70%),radial-gradient(ellipse 50% 35% at 85% 85%,rgba(0,255,204,.06) 0%,transparent 70%);pointer-events:none;z-index:0}
    .shell{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh}
    nav{display:flex;align-items:center;gap:12px;padding:14px 28px;border-bottom:1px solid var(--border);background:rgba(8,12,24,.85);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;flex-wrap:wrap}
    .nav-logo{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;flex-shrink:0}
    .nav-icon{width:32px;height:32px;border-radius:8px;object-fit:contain;flex-shrink:0}
    .nav-shell{display:flex;align-items:center;gap:8px;min-width:0;flex-wrap:wrap}
    .nav-title{font-size:1.1rem;font-weight:700;letter-spacing:-.01em;background:linear-gradient(90deg,var(--accent1),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;cursor:pointer;user-select:none}
    .nav-bc{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--muted);min-width:0;flex-wrap:wrap}
    .nav-bc .sep{opacity:.4}
    .nav-bc .crumb{color:var(--accent2);font-family:var(--font-mono);font-size:.72rem}
    .nav-bc .bc-link{cursor:pointer;text-decoration:underline;text-underline-offset:2px}
    .nav-bc .bc-link:hover{color:var(--accent1)}
    @media (max-width:640px){
      nav{padding:12px 18px}
      .nav-title{font-size:1rem}
      .nav-bc{font-size:.72rem}
    }
    main{flex:1;max-width:860px;width:100%;margin:0 auto;padding:48px 28px 80px}
    .state{text-align:center;padding:80px 0;color:var(--muted)}
    .state .c{font-family:var(--font-mono);color:var(--accent1)}
    /* markdown body */
    .md h1{font-size:clamp(1.7rem,4vw,2.4rem);font-weight:700;letter-spacing:-.02em;margin-bottom:28px;background:linear-gradient(90deg,var(--accent1),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2}
    .md h2{font-size:1.2rem;font-weight:600;color:var(--accent1);margin:36px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
    .md h3{font-size:1rem;font-weight:600;color:var(--accent2);margin:22px 0 6px}
    .md h4,.md h5,.md h6{font-size:.8rem;font-weight:500;color:var(--muted);margin:14px 0 4px;letter-spacing:.04em;text-transform:uppercase;border:none}
    .md p{margin-bottom:14px}
    .md a{color:var(--accent1);text-decoration:none;border-bottom:1px solid rgba(0,204,255,.3);transition:color .15s,border-color .15s}
    .md a:hover{color:var(--accent2);border-bottom-color:var(--accent2)}
    /* top-level list */
    .md>ul{list-style:disc;padding-left:24px;margin:8px 0 20px}
    .md>ul>li{margin-bottom:6px;font-size:.95rem;color:var(--text)}
    .md>ul>li>h3{margin:0;font-size:.95rem;font-weight:600;color:var(--accent2);text-transform:none;letter-spacing:normal;border:none;display:inline}
    /* nested lists */
    .md ul ul,.md ol{list-style:disc;padding-left:22px;margin-bottom:10px}
    .md ul ul li,.md ol li{margin-bottom:3px;font-size:.88rem;color:var(--text)}
    .md ul ul li a,.md ol li a{display:inline;padding:0;font-weight:400;color:var(--accent1);border-bottom:1px solid rgba(0,204,255,.3)}
    .md code{font-family:var(--font-mono);font-size:.85em;background:rgba(0,204,255,.08);color:var(--accent2);padding:2px 6px;border-radius:4px}
    .md pre{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;overflow-x:auto;margin:18px 0}
    .md pre code{background:none;padding:0;color:inherit;font-size:.83rem}
    .md pre code.hljs{background:transparent;padding:0}
    .md blockquote{border-left:3px solid var(--accent1);padding:10px 18px;margin:18px 0;background:rgba(0,204,255,.04);border-radius:0 8px 8px 0;color:var(--muted);font-style:italic}
    .md hr{border:none;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:28px 0}
    .md table{width:100%;border-collapse:collapse;margin:18px 0;font-size:.86rem}
    .md th{text-align:left;padding:9px 13px;background:var(--surface);color:var(--accent1);border:1px solid var(--border);font-weight:600}
    .md td{padding:8px 13px;border:1px solid var(--border);color:var(--text)}
    .md tr:nth-child(even) td{background:rgba(255,255,255,.02)}
    .md img{max-width:100%;border-radius:8px;border:1px solid var(--border)}
    footer{text-align:center;padding:18px 28px;border-top:1px solid var(--border);font-size:.76rem;color:var(--muted);position:relative;z-index:1}
    footer span{background:linear-gradient(90deg,var(--accent1),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:600}
  </style>
</head>
<body>
<div class="shell">
  <nav>
    <div class="nav-logo" id="studio-btn" aria-label="squared-studio home">
      <img class="nav-icon" src="logo.png" alt="squared-studio" />
    </div>
    <div class="nav-shell">
      <span class="nav-bc"><span class="sep">&gt;</span></span>
      <span class="nav-title" id="home-btn">SkillVerse</span>
      <div class="nav-bc" id="breadcrumb"></div>
    </div>
  </nav>
  <main id="content"><div class="state">Loading&#8230;</div></main>
  <footer><p>Copyright &copy; 2026 <span>squared-studio</span></p></footer>
</div>
<script>
  const HOME = "README.md";
  marked.setOptions({gfm:true,breaks:false});

  function currentFile(){
    const h = location.hash.slice(1);
    return h ? decodeURIComponent(h) : HOME;
  }

  function navigate(file){
    if(file === HOME){ history.pushState(null,"",location.pathname); }
    else { location.hash = encodeURIComponent(file); }
    load(file);
  }

  function label(s){ return s.replace(/\.md$/i, ""); }

  function updateBreadcrumb(file){
    const bc = document.getElementById("breadcrumb");
    if(file === HOME){ bc.innerHTML = ""; return; }
    const parts = file.split("/");
    if(parts.length === 1){
      bc.innerHTML = "<span class=\"sep\">&gt;</span><span class=\"crumb\">" + label(parts[0]) + "</span>";
    } else {
      const parentFile = parts[0] + ".md";
      const rest = parts.slice(1).join("/");
      bc.innerHTML =
        "<span class=\"sep\">&gt;</span>" +
        "<span class=\"crumb bc-link\" data-file=\"" + parentFile + "\">" + parts[0] + "</span>" +
        "<span class=\"sep\">&gt;</span>" +
        "<span class=\"crumb\">" + label(rest) + "</span>";
      bc.querySelector(".bc-link").addEventListener("click", () => { navigate(parentFile); window.scrollTo(0,0); });
    }
  }

  function resolveHref(href, base){
    if(/^https?:\/\//.test(href) || href.startsWith("#")) return null;
    const dir = base.includes("/") ? base.split("/").slice(0,-1).join("/")+"/" : "";
    return (dir+href).replace(/\/\.\//, "/");
  }

  function interceptLinks(container, base){
    container.querySelectorAll("a[href]").forEach(a => {
      const href = a.getAttribute("href");
      const resolved = resolveHref(href, base);
      if(!resolved) return;
      a.addEventListener("click", e => {
        e.preventDefault();
        window.scrollTo(0,0);
        navigate(resolved);
      });
    });
  }

  function rewriteImageSources(container, base){
    container.querySelectorAll("img[src]").forEach(img => {
      const src = img.getAttribute("src");
      const resolved = resolveHref(src, base);
      if(!resolved) return;
      img.setAttribute("src", resolved);
    });
  }

  function highlightCode(container){
    if(!window.hljs) return;
    container.querySelectorAll("pre code").forEach(code => {
      if(!code.className.includes("language-")) return;
      hljs.highlightElement(code);
    });
  }

  if(window.hljs && hljs.getLanguage("verilog")){
    hljs.registerAliases(["systemverilog", "sv"], { languageName: "verilog" });
  }

  async function load(file){
    const el = document.getElementById("content");
    el.innerHTML = "<div class=\"state\">Loading&#8230;</div>";
    updateBreadcrumb(file);
    document.title = file === HOME ? "SkillVerse" : file.replace(/\.md$/,"") + " — SkillVerse";
    try {
      const res = await fetch(file + "?t=" + Date.now());
      if(!res.ok) throw new Error("HTTP " + res.status);
      const raw = await res.text();
      const md = raw.replace(/^#{1,6}\s.*Copyright.*squared-studio.*$/m, "").trimEnd();
      el.innerHTML = "<div class=\"md\">" + marked.parse(md) + "</div>";
      rewriteImageSources(el, file);
      highlightCode(el);
      interceptLinks(el, file);
    } catch(err){
      el.innerHTML = "<div class=\"state\"><p>Could not load <span class=\"c\">" + file + "</span></p><p style=\"margin-top:8px;font-size:.8rem\">" + err.message + "</p></div>";
    }
  }

  document.getElementById("studio-btn").addEventListener("click", () => { window.location.href = "https://squared-studio.cc/"; });
  document.getElementById("home-btn").addEventListener("click", () => { navigate(HOME); window.scrollTo(0,0); });
  window.addEventListener("hashchange", () => load(currentFile()));
  load(currentFile());
</script>
</body>
</html>
